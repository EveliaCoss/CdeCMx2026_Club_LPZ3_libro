      chapters: 
      - Parte15.qmd # Identificación de patrones en conjuntos de datos reales
      - Parte16.qmd # Actividad: descubre algo interesante en un conjunto de datos
      - Act4_seccion5.qmd # Actividad: descubre algo interesante en un conjunto de datos
    - part: "**Sección 6** - Datos biológicos"
      chapters: 
      - Parte17.qmd # Primer vistazo a datos biológicos 
