      - Act7_seccion8.qmd # Actividad: de la pregunta al análisis
      - Parte22.qmd # Creación de reportes con Quarto
      - Act8_seccion8.qmd # Actividad en equipo: identificación de patrones en datos genéticos
    - part: "**Sección 9** - Cerebro, Conducta y ambiente (Gene × Environment)"
      chapters: 
      - Parte23.qmd # Salida de campo: ecosistemas de La Paz
      - Parte24.qmd # ¿Cómo influyen las variantes genéticas en nuestro riesgo de salud?
